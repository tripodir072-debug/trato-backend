<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda Activa - TRATO™</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .card { background: white; color: #1e293b; padding: 30px; border-radius: 25px; max-width: 400px; margin: auto; }
        .btn { background: #25D366; color: white; padding: 20px; display: block; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .pin { font-size: 35px; font-weight: 900; color: #0f172a; margin: 20px 0; border: 2px dashed #1877F2; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 60px;">🛡️</div>
        <h2>Bóveda Activa</h2>
        <p>Tu pago ha sido blindado con éxito en la cuenta de Richard Bro.</p>
        <div class="pin" id="pin">...</div>
        <a id="btnWA" href="#" class="btn">AVISAR DEL PAGO A RICHARD 📱</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id') || "PAGO-CONFIRMADO";
        document.getElementById('pin').innerText = paymentId;

        const texto = encodeURIComponent(`🛡️ *AVISO DE PAGO - TRATO™*\n\n¡Hola Richard! Ya realicé el pago.\n🔑 *PIN DE OPERACIÓN:* ${paymentId}`);
        document.getElementById('btnWA').href = `https://wa.me/543456528480?text=${texto}`;
    </script>
</body>
</html>
