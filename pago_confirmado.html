<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Estado de la Operación</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .central-container { border: 2px dashed #2d3748; background: #0a0a0a; padding: 40px; border-radius: 20px; box-shadow: none; text-align: center; width: 90%; max-width: 450px; transition: all 0.4s ease; }
        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 5px; font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.8em; margin-bottom: 30px; text-transform: uppercase; }
        
        .status-box { background: #1a1505; border: 1px solid #ffaa00; padding: 15px; border-radius: 10px; margin-bottom: 25px; transition: all 0.4s ease; }
        .status-text { color: #ffaa00; font-weight: bold; font-size: 1.2em; text-transform: uppercase; }
        
        .panel-paid { border-style: solid !important; border-color: #00ff9d !important; box-shadow: 0 0 30px #00ff9d22 !important; }
        .status-paid { background: #001a0e !important; border-color: #00ff9d !important; }
        .text-paid { color: #00ff9d !important; }

        .btn-portal { display: block; width: 100%; padding: 15px; margin: 12px 0; background: transparent; color: #00d4ff; border: 2px solid #00d4ff; border-radius: 12px; font-weight: bold; text-decoration: none; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-portal:hover { opacity: 0.9; box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-success { background: #00ff9d; color: #000; border-color: #00ff9d; }
        .btn-danger { background: #ff3333; color: #fff; border-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.3); }
        .btn-deposit { background: #00d4ff; color: #050505; border-color: #00d4ff; }
        
        .legal-text { font-size: 0.75em; color: #666; margin-top: 20px; line-height: 1.4; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.98); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .overlay-content { border: 2px solid #ff3333; background: #0a0a0a; padding: 35px; border-radius: 15px; text-align: center; width: 90%; max-width: 420px; }
        .trato-secure-msg { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.95em; line-height: 1.4; color: #e0e0e0; text-align: left; }
    </style>
</head>
<body>

    <div id="pantaya-bloqueo" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #00d4ff; text-transform: uppercase; font-size: 1.3em; margin-bottom: 5px;">⚡ ACREDITACIÓN DE FONDOS</h2>
            <p style="font-size: 0.85em; color: #aaa; margin-bottom: 25px;">Si ya realizaste el pago, hacé clic para activar el búnker.</p>
            <button onclick="confirmarYDepositarBunker()" class="btn-portal btn-deposit">⚡ 1. DEPOSITAR FONDOS (CONFIRMAR)</button>
            <div id="grupo-dni" class="input-group" style="margin-top: 25px; display: none;">
                <label style="color: #00ff9d; font-size: 0.8em; margin-bottom: 5px; display: block;">Ingresa tu DNI para habilitar comprobante</label>
                <input type="tel" id="comprador-dni" placeholder="Ej. 35123456" oninput="this.value = this.value.replace(/[^0-9]/g, '')" style="width: 92%; padding: 10px; border: 1px solid #00ff9d; background: #050505; color: #fff; border-radius: 8px;">
                <button onclick="enviarComprobanteObligatorio()" class="btn-portal btn-danger" style="margin-top: 15px;">📤 2. ENVIAR COMPROBANTE</button>
            </div>
            <button id="btn-continuar" onclick="desbloquearPantalla()" class="btn-portal" style="border-color: #00d4ff; color: #00d4ff; margin-top: 15px;" disabled>✅ CONTINUAR</button>
        </div>
    </div>

    <div id="contenedor-cliente" class="central-container">
        <h1>TRATO™</h1>
        <div class="subtitle">Búnker de Operaciones</div>
        <div id="caja-estado" class="status-box">
            <p id="texto-estado" class="status-text">⏳ ESPERANDO DEPÓSITO...</p>
            <p id="info-operacion" style="font-size: 0.9em; color: #aaa;"></p>
        </div>
        <button onclick="notificarSoporteManual()" class="btn-portal btn-danger">📤 ENVIAR COMPROBANTE A TRATO</button>
        <a href="https://wa.me/5493456528480" class="btn-portal" style="border-color: #ff3333; color: #ff6b6b;">🆘 SOPORTE</a>
    </div>

    <script>
        const UPDATE_URL = "https://bunker-trato-api.onrender.com/marcar-pagado";
        const urlParams = new URLSearchParams(window.location.search);
        
        // Obtenemos los datos, incluyendo el nuevo ID Digital de seguridad
        let productoDetectado = urlParams.get('producto') || 'Producto no especificado';
        let opID = urlParams.get('id') || 'Pendiente';
        let digitalID = urlParams.get('digitalID') || 'No disponible'; // <--- EL ID DIGITAL QUE GENERASTE
        let telefonoVendedor = urlParams.get('tel_vendedor') || "5493456528480";

        function actualizarUI() {
            document.getElementById('info-operacion').innerHTML = `
                <strong>ID de Paquete (Logística):</strong> #${productoDetectado} <br>
                <strong>ID de Seguridad (Digital):</strong> ${digitalID} <br>
                <div class="trato-secure-msg">
                    🛡️ Tu dinero ya está custodiado. <strong>ID de Seguridad para liberar:</strong> ${digitalID}.
                </div>
            `;
        }
        actualizarUI();

        window.confirmarYDepositarBunker = async () => {
            document.getElementById('texto-estado').innerText = "🔒 CUSTODIA ACTIVA";
            document.getElementById('caja-estado').className = "status-box status-paid";
            document.getElementById('contenedor-cliente').className = "central-container panel-paid";
            document.getElementById('grupo-dni').style.display = 'block';
            document.getElementById('btn-continuar').disabled = false;
        };

        window.enviarComprobanteObligatorio = () => {
            const dni = document.getElementById('comprador-dni').value;
            if (!dni) return alert("Ingresa DNI.");
            
            const baseDir = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            // El link de liberación ahora incluye el digitalID
            const linkLiberarOculto = `${baseDir}liberar.html?producto=${productoDetectado}&id=${opID}&digitalID=${digitalID}&tel_vendedor=${telefonoVendedor}`;

            const mensaje = `🛡️ *COMPROBANTE DE PAGO - TRATO™*\n\n` +
                            `ID Operación: ${opID}\n` +
                            `Código Logístico: #${productoDetectado}\n` +
                            `ID Seguridad (Digital): ${digitalID}\n` +
                            `DNI Comprador: ${dni}\n\n` +
                            `🔑 *LINK DE LIBERACIÓN (Guardar hasta recibir producto):*\n${linkLiberarOculto}`;

            window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensaje)}`, '_blank');
        };

        window.desbloquearPantalla = () => { document.getElementById('pantaya-bloqueo').style.display = 'none'; };
        window.notificarSoporteManual = () => { document.getElementById('pantaya-bloqueo').style.display = 'flex'; };
    </script>
</body>
</html>
