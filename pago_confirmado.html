    <script>
        const UPDATE_URL = "https://bunker-trato-api.onrender.com/marcar-pagado";
        
        // 1. PRIMERA CAPTURA (Fase WhatsApp): Si la URL trae datos frescos, los grabamos a fuego en el teléfono
        try {
            const urlParams = new URLSearchParams(window.location.search);
            let prodUrl = urlParams.get('producto');
            let precioUrl = urlParams.get('precio');

            if (prodUrl) {
                localStorage.setItem('trato_prod_actual', prodUrl.trim());
            }
            if (precioUrl) {
                localStorage.setItem('trato_precio_actual', precioUrl.trim());
            }
        } catch (e) {
            console.log("Aviso: No se pudo procesar la lectura inicial de URL.");
        }

        // 2. ANCLAJE FIJO PRIORITARIO: La UI lee ÚNICAMENTE los datos fijos guardados en la memoria del celular
        let productoDetectado = localStorage.getItem('trato_prod_actual') || 'Producto no especificado';
        let precioDetectado = localStorage.getItem('trato_precio_actual') || '';
        
        // 3. DATOS DE MERCADO PAGO: Solo extraemos el ID de comprobante y el estado de la transacción
        let opID = 'Pendiente de validación';
        let statusPago = '';

        try {
            const urlParams = new URLSearchParams(window.location.search);
            statusPago = urlParams.get('status') || urlParams.get('collection_status') || '';
            opID = urlParams.get('id') || urlParams.get('payment_id') || urlParams.get('collection_id') || 'Pendiente de validación';
        } catch (e) {
            console.log("Aviso: No hay parámetros de pasarela en la URL.");
        }

        function actualizarUI() {
            // Pasamos a limpio el precio fijo guardado para clavarle los 2 decimales estrictos
            let precioLimpio = parseFloat(precioDetectado);
            let precioFormateado = isNaN(precioLimpio) ? "A verificar en búnker" : precioLimpio.toFixed(2);

            document.getElementById('info-operacion').innerHTML = `
                <strong>Producto:</strong> #<span id="id-real-html">${productoDetectado}</span> <br>
                <strong>Monto en Custodia:</strong> $ ${precioFormateado} <br>
                <strong>ID de Operación / Comprobante:</strong> ${opID}
            `;
        }

        // Ejecutamos el dibujado fijo inmediato en pantalla
        actualizarUI();

        function activarCustodiaGrafica() {
            document.getElementById('texto-estado').innerText = "🔒 CUSTODIA ACTIVA - FONDOS RESGUARDADOS";
            document.getElementById('caja-estado').className = "status-box status-paid";
            document.getElementById('texto-estado').className = "status-text text-paid";
            document.getElementById('contenedor-cliente').className = "central-container panel-paid";
        }

        // ⚡ DETONACIÓN AUTOMÁTICA AL VENDEDOR (Fase de Retorno Exitoso)
        if (statusPago === 'approved') {
            activarCustodiaGrafica();
            
            // Enviamos la señal a Render usando el ID del producto fijo que guardamos al principio
            (async () => {
                if (productoDetectado && productoDetectado !== 'Producto no especificado') {
                    try {
                        await fetch(UPDATE_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ producto: productoDetectado })
                        });
                        console.log("Señal de cobro registrada en Render para producto #" + productoDetectado);
                    } catch (e) {
                        console.log("Error de red en notificación automática", e);
                    }
                }
            })();
        }

        window.confirmarYDepositarBunker = async () => {
            activarCustodiaGrafica();
            document.getElementById('grupo-dni').style.display = 'block';
            document.getElementById('btn-continuar').disabled = false;

            const idRealParaAsentar = document.getElementById('id-real-html').innerText.trim();

            if (idRealParaAsentar && idRealParaAsentar !== 'Producto no especificado') {
                try {
                    await fetch(UPDATE_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ producto: idRealParaAsentar })
                    });
                } catch (e) {
                    console.log("Error al asentar pago manual", e);
                }
            }
        };

        window.enviarComprobanteObligatorio = () => {
            const compradorDni = document.getElementById('comprador-dni').value;
            if (!compradorDni) {
                return alert("Por favor, ingresa tu DNI o el del titular de la cuenta antes de enviar el comprobante.");
            }
            abrirSoporteWhatsApp(compradorDni);
        };

        window.notificarSoporteManual = () => {
            document.getElementById('pantaya-bloqueo').style.display = 'flex';
        };

        function abrirSoporteWhatsApp(dniUser) {
            const idRealParaAsentar = document.getElementById('id-real-html').innerText.trim();
            const numeroSoporte = "5493456528480";
            
            let precioLimpio = parseFloat(precioDetectado);
            let precioFormateado = isNaN(precioLimpio) ? "A verificar" : precioLimpio.toFixed(2);

            const mensajeComprobante = `🛡️ *DECLARACIÓN Y COMPROBANTE DE PAGO - TRATO™*\n\n` +
                                       `¡Hola! Envío el presente comprobante para activar formalmente el protocolo de custodia de fondos.\n\n` +
                                       `*Datos de la operación:*\n` +
                                       `- ID de Operación / Comprobante: ${opID}\n` +
                                       `- Producto: ${idRealParaAsentar}\n` +
                                       `- Monto total: $ ${precioFormateado}\n` +
                                       `- DNI del Comprador/Titular de Pago: ${dniUser}\n\n` +
                                       `📸 *VALIDACIÓN OBLIGATORIA (FOTO/VIDEO):* \nPor favor adjuntá la foto o video del producto/paquete que muestre el código de operacion pegado para blindar la operación y validar su existencia.\n\n` +
                                       `🔗 *Accedé a tu cuenta de Mercado Pago aquí:* \nhttps://www.mercadopago.com.ar\n\n` +
                                       `⚠️ *AVISO LEGAL Y CONDICIONES OBLIGATORIAS:*\n` +
                                       `1. Es de carácter OBLIGATORIO enviar la captura o comprobante de pago emitido por Mercado Pago o la entidad bancaria utilizada para esta transacción.\n` +
                                       `2. Sin la recepción y validación de dicho comprobante, no se activará la custodia y el comprador no tendrá ningún derecho a reclamo, reembolso o disputa legal sobre el monto del producto, quedando el recargo del 15% por servicio de gestión como no reembolsable en caso de arrepentimiento.\n` +
                                       `3. El usuario declara que, al utilizar el sistema TRATO™ (RichardBro), acepta de forma irrevocable que los fondos quedarán retenidos bajo las condiciones del búnker hasta que se confirme la operación o finalice el plazo legal estipulado.\n\n` +
                                       `*(Adjuntá tu captura o foto del comprobante de pago y la foto/video del producto aquí abajo 👇)*`;

            window.open(`https://api.whatsapp.com/send?phone=${numeroSoporte}&text=${encodeURIComponent(mensajeComprobante)}`, '_blank');
        }

        window.desbloquearPantalla = () => {
            document.getElementById('pantaya-bloqueo').style.display = 'none';
        };

        window.notificar = (tipo) => {
            const idRealParaAsentar = document.getElementById('id-real-html').innerText.trim();
            let mensaje = "";
            const numeroSoporte = "5493456528480";
            const compradorDni = document.getElementById('comprador-dni').value || 'Pendiente de carga';
            
            let precioLimpio = parseFloat(precioDetectado);
            let precioFormateado = isNaN(precioLimpio) ? "A verificar" : precioLimpio.toFixed(2);

            if (tipo === 'envio') {
                mensaje = `🛡️ *NOTIFICACIÓN DE PAGO TRATO™*\n\n¡Hola! Te confirmo que ya realicé el pago. El dinero se encuentra resguardado en el sistema de custodia de TRATO™ (RichardBro). Ya podés proceder con el despacho del producto.\n\n* ID de Operación / Comprobante: ${opID}\n* Producto: ${idRealParaAsentar}\n* Monto: $ ${precioFormateado}\n* DNI del Comprador: ${compradorDni}\n\nQuedo a la espera del envío.`;
            } else {
                mensaje = `🛡️ *NOTIFICACIÓN DE PAGO TRATO™*\n\n¡Hola! Te confirmo que ya realicé el pago. El dinero se encuentra resguardado en el sistema de custodia de TRATO™ (RichardBro). Ya podemos coordinar el encuentro para la entrega.\n\n* ID de Operación / Comprobante: #${opID}\n* Producto: ${idRealParaAsentar}\n* Monto: $ ${precioFormateado}\n* DNI del Comprador: ${compradorDni}\n\nQuedo a la espera para coordinar el punto de encuentro.`;
            }

            window.open(`https://api.whatsapp.com/send?phone=${numeroSoporte}&text=${encodeURIComponent(mensaje)}`, '_blank');
        };
    </script>
