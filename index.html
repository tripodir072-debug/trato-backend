<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Acceso al Búnker</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .central-container { border: 2px solid #00d4ff; background: #0a0a0a; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px #00d4ff33; text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 5px; font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.8em; margin-bottom: 30px; text-transform: uppercase; }
        .btn-portal { display: block; width: 100%; padding: 18px; margin: 10px 0; background: transparent; color: #00d4ff; border: 2px solid #00d4ff; border-radius: 12px; font-weight: bold; text-decoration: none; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: #00d4ff; color: #000; }
        #login-box { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #333; color: #00d4ff; border-radius: 8px; box-sizing: border-box; outline: none; }
        #error-msg { color: #ff4444; font-size: 0.8em; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="central-container">
        <h1>TRATO™</h1>
        <div class="subtitle">Seguridad RichardBro</div>
        <a href="registro.html" class="btn-portal">🛡️ SOLICITAR ACCESO (NUEVOS)</a>
        <button onclick="mostrarLogin()" class="btn-portal btn-primary" id="btn-main">🚀 ENTRAR AL BÚNKER</button>
        <div id="login-box">
            <input type="email" id="email" placeholder="Email Registrado">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-portal btn-primary" id="btn-login">VALIDAR IDENTIDAD</button>
            <div id="error-msg">Credenciales incorrectas o error de conexión con el búnker.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

        // Configuración de tu aplicación limpia
        const firebaseConfig = {
            apiKey: "AIzaSyBqu3cMDwQ7e9oGIpmOiDsTq5iD3kKK5bs",
            authDomain: "comprablok.firebaseapp.com",
            projectId: "comprablok",
            storageBucket: "comprablok.appspot.com",
            messagingSenderId: "1065109328503"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.mostrarLogin = () => {
            document.getElementById('login-box').style.display = 'block';
            document.getElementById('btn-main').style.display = 'none';
        };

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn-login');
            const errorDiv = document.getElementById('error-msg');

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;
            errorDiv.style.display = "none";

            try {
                // Autenticación directa con Firebase
                await signInWithEmailAndPassword(auth, email, pass);
                
                // Si la sesión es válida, redirigimos al generador
                window.location.href = "generador.html";
            } catch (e) {
                console.error(e);
                errorDiv.innerText = "Credenciales incorrectas o error de conexión con el búnker.";
                errorDiv.style.display = "block";
                btn.innerText = "VALIDAR IDENTIDAD";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
