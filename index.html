<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Estación Central</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .central-container { border: 2px solid #00d4ff; background: #0a0a0a; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px #00d4ff33; text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 5px; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 0.8em; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-portal {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            box-sizing: border-box;
        }
        
        .btn-portal:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
        }

        .btn-primary {
            background: #00d4ff;
            color: #000;
        }

        .footer { font-size: 0.7em; margin-top: 40px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="central-container">
        <h1>TRATO™</h1>
        <div class="subtitle">Seguridad RichardBro</div>
        
        <p style="color: #ccc; font-size: 0.9em; margin-bottom: 30px;">Seleccione su nivel de acceso al búnker:</p>

        <a href="registro.html" class="btn-portal">
            🛡️ Solicitar Acceso (DNI)
        </a>

        <a href="generador.html" class="btn-portal btn-primary">
            🚀 Entrar al Búnker
        </a>

        <div class="footer">
            SISTEMA DE CUSTODIA DIGITAL V1.0<br>
            TU DINERO Y SEGURIDAD NOS IMPORTAN
        </div>
    </div>

</body>
</html>
