<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Búnker de Seguridad</title>
    <style>
        /* ESTILO BLINDADO - NEGRO Y AZUL NEÓN RICHARD BRO */
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .bunker-container { 
            border: 2px solid #00d4ff; 
            background: #0a0a0a; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px #00d4ff33; 
            text-align: center; 
            width: 90%; 
            max-width: 350px; 
        }
        h1 { 
            color: #00d4ff; 
            text-transform: uppercase; 
            font-size: 2.2em; 
            margin-bottom: 5px; 
            letter-spacing: 3px;
        }
        .subtitle { 
            color: #888; 
            font-size: 0.9em; 
            margin-bottom: 30px; 
            text-transform: uppercase;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #151515; 
            border: 1px solid #333; 
            color: #00d4ff; 
            border-radius: 8px; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #00d4ff; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: #00d4ff; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #00b8e6; box-shadow: 0 0 15px #00d4ff; }
        button:disabled { background: #444; cursor: not-allowed; box-shadow: none; }
        
        .footer { 
            font-size: 0.7em; 
            margin-top: 25px; 
            color: #444; 
            letter-spacing: 1px;
        }
        #status { margin-top: 10px; font-size: 0.8em; color: #00d4ff; display: none; }
        
        .resultado-link {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border: 1px solid #00ff00;
            border-radius: 10px;
        }
        .url-text {
            font-size: 10px;
            word-break: break-all;
            color: #ccc;
            margin-bottom: 10px;
            display: block;
        }
        .btn-whatsapp {
            background: #25d366;
            color: black;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="bunker-container">
        <h1>TRATO™</h1>
        <div class="subtitle">Búnker RichardBro</div>
        
        <div id="formulario">
            <input type="text" id="prod" placeholder="¿Qué vas a vender?">
            <input type="number" id="monto" placeholder="Precio acordado ($)">
            <button id="btn-blindar" onclick="generarLink()">BLINDAR OPERACIÓN</button>
        </div>

        <div id="status">ESTABLECIENDO CONEXIÓN SEGURA...</div>
        
        <div id="resultado"></div>
        
        <div class="footer">SISTEMA DE CUSTODIA ACTIVO<br>15% COSTO DE PROTECCIÓN</div>
    </div>

    <script>
        async function generarLink() {
            const producto = document.getElementById('prod').value;
            const precioBase = document.getElementById('monto').value;
            const btn = document.getElementById('btn-blindar');
            const status = document.getElementById('status');
            const resultado = document.getElementById('resultado');
            
            if(!producto || !precioBase) {
                return alert("Richard, completá los datos.");
            }
            
            btn.disabled = true;
            status.style.display = "block";

            try {
                const respuesta = await fetch('https://trato-backend-99on.onrender.com/crear-pago', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        producto: producto, 
                        precioBase: parseFloat(precioBase) 
                    })
                });

                const data = await respuesta.json();

                if(data.url) {
                    status.style.display = "none";
                    document.getElementById('formulario').style.display = "none";
                    
                    const opID = Math.floor(Math.random() * 900000) + 100000;
                    
                    const mensajeWA = `🛡️ *CERTIFICADO DE PROTECCIÓN TRATO™*\n` +
                                     `*Operación RichardBro N°:* ${opID}\n\n` +
                                     `Se ha iniciado la custodia de fondos. Al pagar, usted acepta los términos y protocolos de seguridad.\n\n` +
                                     `📦 *PRODUCTO:* ${producto.toUpperCase()}\n` +
                                     `🛡️ *GARANTÍA:* Compra Protegida RichardBro\n\n` +
                                     `🔗 *LINK DE PAGO OFICIAL:*\n${data.url}\n\n` +
                                     `⚖️ *PROTOCOLO LEGAL OBLIGATORIO:*\n` +
                                     `1. *CUSTODIA:* Los fondos quedan retenidos. En envíos, el vendedor debe cargar Tracking. Una vez entregado, hay 24hs hábiles (o 48hs corridas en feriados) para validar antes de la liberación automática.\n` +
                                     `2. *VIDEO UNBOXING:* Es condición OBLIGATORIA grabar un video sin cortes abriendo el paquete sellado. Sin video, no hay derecho a reclamo.\n` +
                                     `3. *VENDEDOR:* Debe registrar fotos/video del despacho para proteger su cobro.\n` +
                                     `4. *EL PIN:* El ID de Operación es su PIN de desbloqueo. Entregarlo implica conformidad irrevocable.\n` +
                                     `5. *RESPONSABILIDAD:* TRATO™ actúa como mediador tecnológico de pago, no otorga garantía técnica sobre el bien.\n\n` +
                                     `_Sistema Blindado TRATO™ RichardBro_`;

                    resultado.innerHTML = `
                        <div class="resultado-link">
                            <p style="color:#00ff00; font-size:14px; font-weight:bold;">🛡️ BÚNKER ACTIVADO</p>
                            <span class="url-text">${data.url}</span>
                            <a href="https://wa.me/?text=${encodeURIComponent(mensajeWA)}" target="_blank" class="btn-whatsapp">
                                📱 ENVIAR CERTIFICADO LEGAL
                            </a>
                            <p style="font-size:10px; color:#666; margin-top:10px;">Link generado con blindaje de responsabilidad.</p>
                        </div>
                    `;
                } else {
                    throw new Error("No hay URL");
                }

            } catch (error) {
                console.error(error);
                alert("ERROR: El búnker no responde. Revisá Render.");
                btn.disabled = false;
                status.style.display = "none";
            }
        }
    </script>

</body>
</html>
