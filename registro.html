<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Registro Blindado</title>
    <style>
        :root {
            --bg-color: #050505;
            --primary-color: #00d4ff;
            --text-color: #e2e8f0;
            --panel-bg: #0a0a0a;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .registro-container { 
            border: 2px solid var(--primary-color); 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
        }

        h1 { 
            color: var(--primary-color); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-size: 1.8em;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            color: var(--primary-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #151515; 
            border: 1px solid #333; 
            color: var(--primary-color); 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 0.95em;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #00ff9d;
        }

        .checkbox-group {
            font-size: 0.75em; 
            color: #888; 
            text-align: left; 
            margin: 18px 0;
            display: flex;
            align-items: flex-start;
        }

        .checkbox-group input {
            width: auto;
            margin-top: 2px;
            margin-right: 8px;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary-color); 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 10px;
            transition: all 0.2s;
        }

        button:hover { 
            opacity: 0.9; 
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        button:disabled { 
            background-color: #2d3748; 
            color: #64748b; 
            cursor: not-allowed; 
            box-shadow: none;
            opacity: 0.6; 
        }

        .footer-note {
            font-size: 0.65em;
            color: #444;
            margin-top: 25px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="registro-container">
        <h1>TRATO™</h1>
        
        <form id="registroForm" onsubmit="iniciarSesion(event)">
            <div class="input-group">
                <label for="nombre">Nombre o Empresa</label>
                <input type="text" id="nombre" placeholder="Ej. Juan Pérez o RichardBro™" required autocomplete="name">
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="Ej. contacto@empresa.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="tel">Número de Teléfono (WhatsApp)</label>
                <input type="tel" id="tel" placeholder="Ej. 5493456... (sin + ni espacios)" required autocomplete="tel">
            </div>

            <div class="input-group">
                <label for="cbu">Tu CBU o Alias</label>
                <input type="text" id="cbu" placeholder="Ej. alias.banco" required>
            </div>
            
            <div class="input-group">
                <label for="dni">Validación de Identidad (DNI)</label>
                <input type="tel" id="dni" placeholder="Ej. 35123456" pattern="[0-9]*" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="acepta-terminos" onchange="toggleBoton()">
                <label for="acepta-terminos" style="cursor:pointer;">
                    Comprendo que TRATO™ opera como agente de custodia y acepto los términos del protocolo de seguridad.
                </label>
            </div>

            <button type="submit" id="btn-submit" disabled>🔑 INGRESAR AL BÚNKER</button>
        </form>

        <div class="footer-note">
            TRATO™ BY RICHARDBRO™ - 2026
        </div>
    </div>

    <script>
        window.toggleBoton = function() {
            const acepta = document.getElementById('acepta-terminos').checked;
            document.getElementById('btn-submit').disabled = !acepta;
        };

        window.iniciarSesion = function(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-submit');

            btn.innerText = "Ingresando...";
            btn.disabled = true;

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const tel = document.getElementById('tel').value;
            const cbu = document.getElementById('cbu').value;
            const dni = document.getElementById('dni').value;

            // Enviar los datos completos a generador.html por URL
            const url = `generador.html?nombre=${encodeURIComponent(nombre)}&email=${encodeURIComponent(email)}&telefono=${encodeURIComponent(tel)}&cbu=${encodeURIComponent(cbu)}&dni=${encodeURIComponent(dni)}`;
            window.location.href = url;
        };
    </script>
</body>
</html>
