<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ | Registro Blindado</title>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .registro-container { border: 2px solid #00d4ff; background: #0a0a0a; padding: 30px; border-radius: 20px; box-shadow: 0 0 30px #00d4ff33; text-align: center; width: 90%; max-width: 400px; }
        h1 { color: #00d4ff; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #151515; border: 1px solid #333; color: #00d4ff; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        #mensaje { margin-top: 15px; font-size: 0.9em; padding: 15px; border-radius: 10px; display: none; }
        .token-box { background: #00d4ff; color: #000; font-weight: 800; font-size: 1.5em; padding: 10px; margin-top: 10px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="registro-container">
        <h1>TRATO™</h1>
        <form id="registroForm">
            <input type="text" id="nombre" placeholder="Nombre Real" required>
            <input type="number" id="dni" placeholder="DNI" required>
            <input type="tel" id="tel" placeholder="WhatsApp" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Contraseña" required>
            <button type="submit" id="btn-submit">SOLICITAR ACCESO</button>
        </form>
        <div id="mensaje"></div>
    </div>

    <script>
        // 🚀 REEMPLAZÁ ESTA URL POR LA TUYA DE RENDER
        const RENDER_URL = "https://trato-backend.onrender.com/registrar-trato";

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            const datos = {
                nombre: document.getElementById('nombre').value,
                dni: document.getElementById('dni').value,
                tel: document.getElementById('tel').value,
                email: document.getElementById('email').value,
                pass: document.getElementById('pass').value, // El server se encarga de crear el usuario
                vendedorId: "RichardBro_Admin" // Identificador para tu control
            };

            try {
                const respuesta = await fetch(RENDER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datos)
                });

                const resultado = await respuesta.json();

                if (resultado.success) {
                    document.getElementById('registroForm').style.display = "none";
                    document.getElementById('mensaje').style.display = "block";
                    document.getElementById('mensaje').innerHTML = `
                        <p style="color: #00ff00;">¡BÚNKER ACTIVADO!</p>
                        <p>Tu ID de Trato es:</p>
                        <div class="token-box">${resultado.id}</div>
                        <p style="font-size: 0.8em; margin-top: 10px;">Los datos han sido respaldados en Firebase.</p>
                    `;
                } else {
                    throw new Error(resultado.error);
                }
            } catch (error) {
                alert("Error de conexión con el búnker: " + error.message);
                btn.innerText = "SOLICITAR ACCESO";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
