<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ - Generador de Operaciones</title>
    <style>
        :root { --bg-color: #0a0e17; --panel-bg: #121824; --primary-color: #00ff9d; --text-color: #e2e8f0; --accent-color: #00d4ff; --danger-color: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--panel-bg); padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 212, 255, 0.15); }
        h2 { margin-top: 0; color: var(--primary-color); font-size: 20px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; color: var(--accent-color); margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background-color: #050810; border: 1px solid #2d3748; border-radius: 6px; color: var(--text-color); font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: #050810; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .user-header { font-size: 10px; text-align: right; color: var(--accent-color); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .cost-info { font-size: 11px; color: var(--primary-color); margin-bottom: 16px; background: rgba(0, 255, 157, 0.05); padding: 10px; border-radius: 6px; border-left: 4px solid var(--primary-color); }
        .live-panel { background: #050810; border: 1px dashed #2d3748; padding: 15px; border-radius: 8px; margin-top: 18px; }
        .status-tracker { font-size: 12px; font-weight: bold; padding: 10px; border-radius: 6px; text-align: center; background: #1a1505; color: #ffaa00; border: 1px solid #ffaa00; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="user-header" id="session-header">👤 Sesión: Cargando...</div>
        <h2>🛡️ Búnker TRATO™</h2>
        
        <div class="cost-info">
            TRATO™ actúa como intermediario. Recargo del 15%.
        </div>

        <div class="input-group">
            <label for="prod">Pegá estos 4 dígitos en el producto o caja que vas a enviar:</label>
            <input type="text" id="prod" placeholder="Ej. 1234" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);" inputmode="numeric">
        </div>

        <div class="input-group">
            <label for="monto">Monto base (ARS)</label>
            <input type="number" id="monto" placeholder="Ej. 150000" oninput="calcularTotal()">
        </div>

        <div class="input-group">
            <label for="cbu-alias">CBU / Alias</label>
            <input type="text" id="cbu-alias" readonly>
        </div>

        <div class="input-group">
            <label for="vendedor-dni">DNI</label>
            <input type="text" id="vendedor-dni" readonly>
        </div>

        <div class="cost-info" id="precio-detalle">Monto total (15%): $ 0</div>

        <button class="btn-success" onclick="enviarSoporteDirecto()" style="background:#00ff9d; color:#050810;">📤 1. ENVIAR DATOS A SOPORTE</button>
        <button onclick="procesarOperacion()" style="background-color: var(--accent-color); color: #050810; margin-top: 12px;">🔗 2. GENERAR Y ENVIAR AL COMPRADOR</button>

        <div class="live-panel">
            <div style="color: #64748b; font-size: 10px; margin-bottom: 5px;">🖥️ MONITOREO EN VIVO</div>
            <div id="estado-vivo" class="status-tracker">⏳ ESPERANDO INICIAR</div>
        </div>
    </div>

    <script>
        // --- INICIALIZACIÓN SEGURA ---
        window.onload = function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const campos = ['nombre', 'cbu', 'dni', 'email', 'telefono'];
                
                // Guardar en memoria si vienen datos nuevos
                campos.forEach(campo => {
                    const valor = urlParams.get(campo);
                    if(valor) localStorage.setItem('trato_' + campo, decodeURIComponent(valor));
                });

                // Cargar en interfaz con seguridad (si es null, pone 'Vendedor')
                const nombre = localStorage.getItem('trato_nombre') || 'Vendedor';
                document.getElementById('session-header').innerText = `👤 Sesión: ${nombre}`;
                document.getElementById('cbu-alias').value = localStorage.getItem('trato_cbu') || '';
                document.getElementById('vendedor-dni').value = localStorage.getItem('trato_dni') || '';
            } catch(e) {
                console.error("Error al cargar sesión:", e);
            }
        };

        function calcularTotal() {
            const monto = parseFloat(document.getElementById('monto').value) || 0;
            document.getElementById('precio-detalle').innerText = `ℹ️ Monto total con comisión (15%): $ ${(monto * 1.15).toFixed(2)}`;
        }

        function enviarSoporteDirecto() {
            const prod = document.getElementById('prod').value;
            const monto = parseFloat(document.getElementById('monto').value) || 0;
            if(!prod) return alert("Ingresá los 4 dígitos del paquete");

            const mensaje = `🛡️ *NUEVA VENTA TRATO™*\n\n` +
                            `*Vendedor:* ${localStorage.getItem('trato_nombre') || 'Sin nombre'}\n` +
                            `*DNI:* ${localStorage.getItem('trato_dni') || 'Sin DNI'}\n` +
                            `*Código Físico:* #${prod}\n` +
                            `*Total:* $${(monto*1.15).toFixed(2)}`;
            window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        async function procesarOperacion() {
            const prod = document.getElementById('prod').value;
            const monto = parseFloat(document.getElementById('monto').value) * 1.15;
            if(!prod) return alert("Ingresá los 4 dígitos");

            const digitalID = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Fetch a tu API de Render
            try {
                const response = await fetch("https://bunker-trato-api.onrender.com/crear-pago", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ producto: digitalID, precioBase: monto })
                });
                const data = await response.json();
                
                if (data.url) {
                    const linkPago = `${data.url}&producto=${prod}&digitalID=${digitalID}&tel_vendedor=${localStorage.getItem('trato_telefono')}`;
                    const mensaje = `🛡️ *TRATO™ - LINK DE PAGO*\n\n*ID Seguridad:* ${digitalID}\n*Cód. Paquete:* #${prod}\n\n🔗 Pagar aquí: ${linkPago}`;
                    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensaje)}`, '_blank');
                    
                    document.getElementById('estado-vivo').innerText = "🟢 BÚNKER ACTIVO - ESPERANDO PAGO";
                }
            } catch(e) {
                alert("Error conectando con el servidor. Revisá tu conexión.");
            }
        }
    </script>
</body>
</html>
