<script>
    // --- MOTOR DE PERSISTENCIA Y CARGA ---
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. Campos que queremos memorizar
        const campos = ['nombre', 'cbu', 'dni', 'email', 'telefono'];
        
        // 2. Si vienen datos por URL (desde registro.html), los guardamos en memoria (localStorage)
        campos.forEach(campo => {
            if(urlParams.get(campo)) {
                localStorage.setItem('trato_' + campo, decodeURIComponent(urlParams.get(campo)));
            }
        });

        // 3. Cargamos los datos desde memoria para mostrar en pantalla
        const nombreGuardado = localStorage.getItem('trato_nombre') || 'Vendedor';
        document.getElementById('session-header').innerText = `👤 Sesión: ${nombreGuardado}`;
        
        // Rellenar los campos de solo lectura si existen
        if(document.getElementById('cbu-alias')) document.getElementById('cbu-alias').value = localStorage.getItem('trato_cbu') || '';
        if(document.getElementById('vendedor-dni')) document.getElementById('vendedor-dni').value = localStorage.getItem('trato_dni') || '';
        
        // Calcular comisión inicial si hay datos
        window.calcularTotal();
    };

    window.calcularTotal = function() {
        const monto = parseFloat(document.getElementById('monto').value) || 0;
        const total = monto * 1.15;
        document.getElementById('precio-detalle').innerText = `ℹ️ Monto total con comisión (15%): $ ${total.toFixed(2)}`;
    };

    window.enviarSoporteDirecto = function() {
        const producto = document.getElementById('prod').value;
        const monto = parseFloat(document.getElementById('monto').value) || 0;
        
        if(!producto || monto === 0) return alert("Por favor completá el producto y el monto.");

        // Recuperamos TODO de la memoria interna
        const sNombre = localStorage.getItem('trato_nombre') || 'Vendedor';
        const sDni = localStorage.getItem('trato_dni') || 'No definido';
        const sTel = localStorage.getItem('trato_telefono') || 'No definido';
        const sCbu = localStorage.getItem('trato_cbu') || 'No definido';

        const mensaje = `🛡️ *NUEVA VENTA TRATO™*\n\n` +
                        `*Vendedor:* ${sNombre}\n` +
                        `*DNI:* ${sDni}\n` +
                        `*Teléfono:* ${sTel}\n` +
                        `*CBU/Alias:* ${sCbu}\n\n` +
                        `*Detalle:*\n` +
                        `- Código Físico (Pegado en caja): #${producto}\n` +
                        `- Monto Final: $ ${(monto*1.15).toFixed(2)}`;
                        
        window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensaje)}`, '_blank');
    };

    // ... (El resto de tus funciones de monitoreo y procesarOperacion siguen igual)
</script>
