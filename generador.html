    <script type="module">
        const RENDER_URL = "https://bunker-trato-api.onrender.com/crear-pago";

        function constParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const vendedorNombre = urlParams.get('nombre') || 'RichardBro™';
            const vendedorEmail = urlParams.get('email') || 'sin-correo@trato.com';
            const vendedorTelefono = urlParams.get('telefono') || 'Sin Teléfono';
            const vendedorCbu = urlParams.get('cbu') || 'Sin CBU asignado';
            const vendedorDni = urlParams.get('dni') || 'Sin DNI';

            document.getElementById('session-header').innerText = `👤 Sesión: ${vendedorNombre}`;
            document.getElementById('cbu-alias').value = vendedorCbu;
            document.getElementById('vendedor-dni').value = vendedorDni;

            const prodParam = urlParams.get('prod');
            const montoParam = urlParams.get('monto');
            if (prodParam) document.getElementById('prod').value = decodeURIComponent(prodParam);
            if (montoParam) {
                document.getElementById('monto').value = decodeURIComponent(montoParam);
                calcularTotal();
            }
        }

        window.addEventListener('DOMContentLoaded', constParams);

        window.limpiarFormulario = function() {
            document.getElementById('prod').value = "";
            document.getElementById('monto').value = "";
            document.getElementById('precio-detalle').innerText = "ℹ️ Monto total con comisión (15%): $ 0";
            document.getElementById('acepta-terminos').checked = false;
            toggleBoton();
        };

        window.abrirTerminos = function() {
            document.getElementById('modalTerminos').style.display = 'flex';
            document.getElementById('acepta-terminos').disabled = false;
        };

        window.cerrarTerminos = function() {
            document.getElementById('modalTerminos').style.display = 'none';
        };

        window.calcularTotal = function() {
            const precioBase = parseFloat(document.getElementById('monto').value) || 0;
            const total = precioBase * 1.15;
            document.getElementById('precio-detalle').innerText = `ℹ️ Monto total con comisión (15%): $ ${total.toFixed(2)}`;
        };

        window.toggleBoton = function() {
            const acepta = document.getElementById('acepta-terminos').checked;
            document.getElementById('btn-blindar').disabled = !acepta;
            document.getElementById('btn-soporte').disabled = !acepta;
        };

        window.enviarSoporteDirecto = function() {
            const producto = document.getElementById('prod').value;
            const monto = document.getElementById('monto').value;
            if (!producto || !monto) return alert("Completa los campos.");

            const urlParams = new URLSearchParams(window.location.search);
            const total = parseFloat(monto) * 1.15;
            const currentURL = window.location.href; // El link de retorno que necesitás

            // MENSAJE PARA SOPORTE: FICHA TÉCNICA COMPLETA + LINK DE RETORNO (FOTO 15619)
            const mensaje = `🛡️ *NUEVA VENTA - TRATO™*\n\n` +
                          `*Datos del Vendedor:*\n` +
                          `• Nombre: ${urlParams.get('nombre') || 'RichardBro™'}\n` +
                          `• DNI / Identificación: ${urlParams.get('dni') || 'Sin DNI'}\n` +
                          `• Correo: ${urlParams.get('email') || 'Sin correo'}\n` +
                          `• Teléfono: ${urlParams.get('telefono') || 'Sin teléfono'}\n` +
                          `• CBU / Alias: ${urlParams.get('cbu') || 'Sin CBU'}\n\n` +
                          `*Datos de la Operación:*\n` +
                          `• ID Operación: PENDIENTE DE PAGO\n` +
                          `• Número de Paquete o Producto: ${producto}\n` +
                          `• Monto Total (con 15%): $ ${total.toFixed(2)}\n\n` +
                          `*Link de retorno:* ${currentURL}\n\n` +
                          `ℹ️ *VALIDACIÓN DE IDENTIDAD Y DEPÓSITO:*\n` +
                          `Los datos del vendedor han sido verificados para procesar el depósito del pago en caso de una transacción exitosa. RichardBro™ 2026.`;
            
            window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensaje)}`, '_blank');
        };

        window.procesarOperacion = async function(tipo) {
            const producto = document.getElementById('prod').value;
            const monto = document.getElementById('monto').value;
            if (!producto || !monto) return alert("Completa los datos.");

            const status = document.getElementById('status');
            status.style.display = "block";

            try {
                const total = parseFloat(monto) * 1.15;
                const totalFormateado = total.toFixed(2);
                
                const res = await fetch(RENDER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ producto, precioBase: total })
                });
                const data = await res.json();

                if (data.url) {
                    // MENSAJE PARA EL COMPRADOR: PRIVACIDAD TOTAL (MONTO Y LINK)
                    const msg = `🛡️ *TRATO™ | TÉRMINOS Y CONDICIONES Y LINK DE PAGO*\n\n` +
                              `¡Hola! Estás por realizar una compra con el sistema blindado TRATO™ (RichardBro™).\n\n` +
                              `• *💰 MONTO TOTAL A CUSTODIAR:* $ ${totalFormateado}\n` +
                              `• *🔒 Protección del Comprador:* Tu dinero queda resguardado en el búnker hasta que recibas el producto.\n\n` +
                              `🔴 *¡ATENCIÓN OBLIGATORIA!* 🔴\n` +
                              `*Luego de pagar, enviá la captura de pantalla a TRATO™ para blindar la operación.*\n\n` +
                              `🔗 *Link de pago seguro:* ${data.url}\n\n` +
                              `_Al realizar el pago, aceptás las condiciones de custodia de RichardBro™._`;
                              
                    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
                }
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                status.style.display = "none";
            }
        };
    </script>
