<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRATO™ - Generador de Operaciones</title>
    <style>
        :root { --bg-color: #0a0e17; --panel-bg: #121824; --primary-color: #00ff9d; --text-color: #e2e8f0; --accent-color: #00d4ff; --danger-color: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--panel-bg); padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 212, 255, 0.15); }
        h2 { margin-top: 0; color: var(--primary-color); font-size: 20px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; color: var(--accent-color); margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background-color: #050810; border: 1px solid #2d3748; border-radius: 6px; color: var(--text-color); font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: #050810; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #2d3748; color: #64748b; cursor: not-allowed; opacity: 0.6; }
        .user-header { font-size: 10px; text-align: right; color: var(--accent-color); margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-content { background-color: var(--panel-bg); padding: 25px; border: 1px solid var(--accent-color); width: 85%; max-width: 450px; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="user-header" id="session-header">👤 Sesión: Vendedor</div>
        <h2>🛡️ Búnker TRATO™</h2>

        <div class="input-group">
            <label for="prod">Pegá estos 4 dígitos en el producto o caja que vas a enviar:</label>
            <input type="text" id="prod" placeholder="Ej. 1234" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);" inputmode="numeric">
        </div>

        <div class="input-group">
            <label for="monto">Monto base (ARS)</label>
            <input type="number" id="monto" placeholder="Ej. 150000">
        </div>

        <button id="btn-soporte" class="btn-success" onclick="enviarSoporteDirecto()" style="background:#00ff9d;">📤 1. ENVIAR DATOS A SOPORTE</button>
        <button id="btn-blindar" onclick="procesarOperacion()" disabled style="background-color: var(--accent-color); color: #050810; margin-top: 12px;">🔗 2. GENERAR Y ENVIAR AL COMPRADOR</button>

        <div style="font-size: 0.7em; color: #666; margin-top: 20px; text-align: center;">
            <a style="color: var(--accent-color); cursor: pointer;" onclick="abrirTerminos()">Ver términos legales completos</a>
        </div>
    </div>

    <div id="modalTerminos" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarTerminos()">&times;</span>
            <h3 style="color: var(--accent-color);">🛡️ Términos y Condiciones</h3>
            <p style="font-size: 11px;">TRATO™ actúa como agente custodio. Al usar el servicio se acepta el 15% de comisión.</p>
        </div>
    </div>

    <script>
        window.onload = function() {
            const campos = ['nombre', 'cbu', 'dni', 'email', 'telefono'];
            const urlParams = new URLSearchParams(window.location.search);
            campos.forEach(campo => {
                if(urlParams.get(campo)) localStorage.setItem('trato_' + campo, decodeURIComponent(urlParams.get(campo)));
            });
            document.getElementById('session-header').innerText = `👤 Sesión: ${localStorage.getItem('trato_nombre') || 'Vendedor'}`;
        };

        // Función unificada para generar el link de retorno
        function generarLinkRetorno() {
            const prod = document.getElementById('prod').value;
            const monto = document.getElementById('monto').value;
            const baseUrl = window.location.href.split('?')[0];
            return `${baseUrl}?nombre=${encodeURIComponent(localStorage.getItem('trato_nombre'))}&email=${encodeURIComponent(localStorage.getItem('trato_email'))}&telefono=${encodeURIComponent(localStorage.getItem('trato_telefono'))}&cbu=${encodeURIComponent(localStorage.getItem('trato_cbu'))}&dni=${encodeURIComponent(localStorage.getItem('trato_dni'))}&prod=${prod}&monto=${monto}`;
        }

        function abrirTerminos() { document.getElementById('modalTerminos').style.display = 'flex'; }
        function cerrarTerminos() { document.getElementById('modalTerminos').style.display = 'none'; }

        function enviarSoporteDirecto() {
            const prod = document.getElementById('prod').value;
            const monto = parseFloat(document.getElementById('monto').value) || 0;
            if(!prod || monto === 0) return alert("Completá el código y el monto");
            
            document.getElementById('btn-blindar').disabled = false;

            const total = (monto * 1.15).toFixed(2);
            const linkRetorno = generarLinkRetorno();
            const tel = localStorage.getItem('trato_telefono');
            
            const mensaje = `🛡️ *NUEVA VENTA REGISTRADA - TRATO™*\n\n` +
                            `*Datos del Vendedor:*\n- Nombre: ${localStorage.getItem('trato_nombre')}\n- DNI: ${localStorage.getItem('trato_dni')}\n- Correo: ${localStorage.getItem('trato_email')}\n- Teléfono: ${tel}\n- CBU: ${localStorage.getItem('trato_cbu')}\n\n` +
                            `*Datos de la Operación:*\n- ID Operación: PENDIENTE DE PAGO\n- Número de Paquete: ${prod}\n- Monto Total (con 15%): $ ${total}\n\n` +
                            `↩️ *Link de retorno:* ${linkRetorno}\n\n` +
                            `📦 *PANEL DE LOGÍSTICA (Exclusivo Vendedor):*\n` +
                            `https://tripodir072-debug.github.io/trato-backend/despacho.html?producto=${prod}&tel_vendedor=${tel}&id=${prod}\n\n` +
                            `ℹ️ *VALIDACIÓN DE IDENTIDAD Y DEPÓSITO:* Los datos del vendedor han sido verificados.`;

            window.open(`https://api.whatsapp.com/send?phone=5493456528480&text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        async function procesarOperacion() {
            const prod = document.getElementById('prod').value;
            const linkRetorno = generarLinkRetorno(); // Mismo link acá
            const digitalID = Math.floor(100000 + Math.random() * 900000).toString();
            
            const res = await fetch("https://bunker-trato-api.onrender.com/crear-pago", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ producto: digitalID, precioBase: 0 })
            });
            const data = await res.json();
            
            if(data.url) {
                const link = `${data.url}&producto=${prod}&digitalID=${digitalID}&id=${digitalID}&tel_vendedor=${localStorage.getItem('trato_telefono')}`;
                // Agregamos el link de retorno también al mensaje del comprador
                const mensajeComprador = `🛡️ *TRATO™ - LINK DE PAGO*\n\n🔗 Pagar aquí: ${link}\n\n↩️ *Gestión del Trato:* ${linkRetorno}`;
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensajeComprador)}`, '_blank');
            }
        }
    </script>
</body>
</html>
